<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>顧客登録フォーム</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app-shell">
    <section class="screen">
      <div class="screen-header">
        <div>
          <p class="eyebrow">Customer</p>
          <h1>顧客登録フォーム</h1>
          <p>顧客コード、年代、性別を SQLite の `customers` テーブルへ登録します。</p>
        </div>
      </div>

      <form id="customerForm" class="card">
        <label class="form-row">
          <span>顧客コード</span>
          <input type="text" name="customer_code" placeholder="customer_004" required>
        </label>

        <label class="form-row">
          <span>年代</span>
          <select name="age_group" required>
            <option value="">選択してください</option>
            <option value="20代">20代</option>
            <option value="30代">30代</option>
            <option value="40代">40代</option>
            <option value="50代">50代</option>
            <option value="60代">60代</option>
          </select>
        </label>

        <label class="form-row">
          <span>性別</span>
          <select name="gender" required>
            <option value="">選択してください</option>
            <option value="male">男性</option>
            <option value="female">女性</option>
            <option value="other">その他</option>
          </select>
        </label>

        <button type="submit" class="primary-button">登録する</button>
      </form>

      <p id="message"></p>
      <p><a href="./index.html">トップへ戻る</a></p>
    </section>
  </main>

  <script>
    const form = document.getElementById("customerForm");
    const message = document.getElementById("message");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const body = new URLSearchParams(new FormData(form));

      try {
        const response = await fetch("/customers", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body
        });
        message.textContent = await response.text();
        if (response.ok) form.reset();
      } catch (error) {
        message.textContent = "通信エラーが発生しました";
        console.error(error);
      }
    });
  </script>
</body>
</html>
